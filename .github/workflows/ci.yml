name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # ffmpeg/ffprobe are a system prerequisite (used by enhance/view/frame
      # extraction); the unit suite exercises them.
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      # Phase 0 acceptance check: the built entrypoint must actually run.
      - run: node dist/bin/overcast.js --version --json
      - run: npm test

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          find . -name '*.sh' -not -path './node_modules/*' -print0 \
            | xargs -0 -r shellcheck -S warning
